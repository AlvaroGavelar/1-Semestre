<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Formulário</title>
  </head>

  <body>
    <main>
      <header><h1>Formulario</h1></header>
      <section>
        <header><h3>Topicos</h3></header>
        <nav>
          <a href="#form"> Formulario </a>
          <br />
          <a href="#Disciplina Dif">Disciplina com Dificuldade</a>
          <br />
          <a href="Disciplina Fav"> Disciplina Favoita</a>
        </nav>
      </section>
      <br />
      <section id="form">
        <header><h2>Formulário</h2></header>
        <form>
          <label>
            Nome:
            <input type="text" />
          </label>
          <br /><br />
          <label>
            Idade:
            <input type="number" />
          </label>
          <br /><br />
          <label>
            Email:
            <input type="email" />
          </label>
          <br /><br />
          <label>
            Cor Favorita:
            <input type="color" />
          </label>

          <br /><br />
          <label id="Disciplina Dif">
            Disciplinas que está com dificuldade:
            <br />
            <input type="checkbox" /> Desenvolvimento de Pagina Web 1
            <br />
            <input type="checkbox" /> Introdução a programação
            <br />
            <input type="checkbox" /> Introdução ao Direito
            <br />
            <input type="checkbox" /> Fundamentos de Sistemas de Informação
            <br />
            <input type="checkbox" /> Calculo Diferencial e Integral
            <br />
            <input type="checkbox" /> Arquitetura e Organização de Computadores
          </label>

          <br /><br />

          <label id="Disciplina Fav">
            Disciplina Favrita:
            <br />
            <input type="radio" name="Disciplina" /> Desenvolvimento de PAgina
            Web 1
            <br />
            <input type="radio" name="Disciplina" /> Introdução a programação
            <br />
            <input type="radio" name="Disciplina" /> Introdução ao Direito
            <br />
            <input type="radio" name="Disciplina" /> Fundamentos de Sistemas de
            Informação
            <br />
            <input type="radio" name="Disciplina" /> Calculo Diferencial e
            Integral
            <br />
            <input type="radio" name="Disciplina" /> Arquitetura e Organização
            de Computadores
          </label>
          <br /><br />
          <label>
            <input type="submit" value="Enviar" />
          </label>
        </form>
      </section>
      <section>
        <header><h3>Links</h3></header>
        <nav>
          <a href="index.html" target="_blank"> Index </a>
          <br />
          <a href="tabela.html" target="_blank"> Tabela</a>
        </nav>
      </section>
    </main>
    <br />
    <footer>Tudo Meu, Nada seu!</footer>
